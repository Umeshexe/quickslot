services:
  # ──────────────────────────────────────────────
  # Postgres
  # ──────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: quickslot
      POSTGRES_PASSWORD: quickslot
      POSTGRES_DB: quickslot
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql  # auto-runs on first start
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quickslot"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────
  # Next.js API server
  # ──────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://quickslot:quickslot@db:5432/quickslot
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

  # ──────────────────────────────────────────────
  # One-shot seeder (runs, seeds, then exits)
  # ──────────────────────────────────────────────
  seed:
    build:
      context: .
      dockerfile: Dockerfile
    command: npx tsx db/seed.ts
    environment:
      DATABASE_URL: postgresql://quickslot:quickslot@db:5432/quickslot
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

volumes:
  pg_data:
